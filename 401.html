<script>
  function setTheme(prefersDark, darkModePreference) {
    const applyDarkTheme = darkModePreference !== "false" && (prefersDark || darkModePreference === "true");
    toggleTheme(applyDarkTheme);
  }

  function getDarkModePreference() {
    return document.cookie.match(/(?<=darkMode=)(true|false)/)?.[0];
  }

  function setDarkModePreference(value) {
    document.cookie = `darkMode=${value}`;
  }

  function toggleTheme(applyDarkTheme) {
    // Apply the bd-dark class immediately
    document.documentElement.classList.toggle("bd-dark", applyDarkTheme);
    let webclip = document.querySelector('link[rel="apple-touch-icon"]')
    let webclipLink = applyDarkTheme ? "assets/6465e3966b41a1a8b951b0ee/64a820e44737583042595856_Webclip_dark.png" : "assets/6465e3966b41a1a8b951b0ee/64a8210712df48ce9a1bf1ca_Webclip.png";
    let favicon = document.querySelector('link[rel="shortcut icon"]')
    let faviconLink = applyDarkTheme ? "assets/6465e3966b41a1a8b951b0ee/64a820e3593e1e3560b2ee92_Favicon_dark.png" : "assets/6465e3966b41a1a8b951b0ee/64a821020a2261a2f6244dd9_Favicon.png";
    webclip.setAttribute('href', webclipLink);
    favicon.setAttribute('href', faviconLink);
  }

  function updateThemeToggle(applyDarkTheme) {
    const themeToggle = document.querySelector(".theme-toggle");
    if (themeToggle) {
      themeToggle.classList.toggle("theme-toggle--toggled", !applyDarkTheme);
    }
  }

  function handleDarkModeToggle() {
    const darkModeEnabled = !document.documentElement.classList.contains("bd-dark");
    toggleTheme(darkModeEnabled);
    updateThemeToggle(darkModeEnabled);
    setDarkModePreference(darkModeEnabled.toString());
  }

  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const darkModePreference = getDarkModePreference();
  setTheme(prefersDark, darkModePreference);

  // Add the DOMContentLoaded event listener separately to avoid the issue
  document.addEventListener("DOMContentLoaded", () => {
    const applyDarkTheme = document.documentElement.classList.contains("bd-dark");
    updateThemeToggle(applyDarkTheme);

    const button = document.getElementById("dark-mode");
    button?.addEventListener("click", handleDarkModeToggle);
  });

</script>
